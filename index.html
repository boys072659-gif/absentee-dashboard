<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통합 심방 계획 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',-apple-system,sans-serif;background:#f0f2f5;color:#333;min-height:100vh;}

/* ══ 로그인 ══ */
#page-login{min-height:100vh;background:linear-gradient(160deg,#1a2a4a,#2c3e50);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border-radius:20px;padding:44px 36px;width:90%;max-width:380px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.login-icon{font-size:52px;margin-bottom:14px;}
.login-title{font-size:20px;font-weight:bold;color:#2c3e50;margin-bottom:6px;}
.login-sub{font-size:13px;color:#999;margin-bottom:20px;}
.pin-display{font-size:30px;letter-spacing:10px;text-align:center;color:#2c3e50;margin-bottom:18px;min-height:44px;border-bottom:3px solid #3498db;padding-bottom:8px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;max-width:260px;margin-left:auto;margin-right:auto;}
.pin-key{padding:17px 0;font-size:20px;font-weight:bold;color:#2c3e50;background:#f0f2f5;border:none;border-radius:12px;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.pin-key:active{background:#d5d8dc;transform:scale(.95);}
.pin-del{background:#fde8e8;color:#e74c3c;}
.pin-enter{background:#3498db;color:#fff;}
.login-err{color:#e74c3c;font-size:13px;margin-top:10px;min-height:18px;}

/* 직책 선택 */
.role-select-wrap{display:none;margin-top:16px;text-align:left;}
.role-select-wrap label{font-size:13px;color:#666;font-weight:bold;display:block;margin-bottom:6px;}
.role-select{width:100%;padding:11px 12px;border:2px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none;}
.role-confirm-btn{margin-top:10px;width:100%;padding:14px;background:#27ae60;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;}

/* ══ 로딩 ══ */
#loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.9);z-index:9900;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spinner{width:44px;height:44px;border:5px solid #eee;border-top-color:#3498db;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:14px;color:#555;}

/* ══ 메인 ══ */
#page-main{display:none;max-width:1600px;margin:0 auto;}
.top-hd{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:12px 20px 10px;position:sticky;top:0;z-index:100;}
.top-hd-inner{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.top-hd h1{font-size:16px;font-weight:bold;}
.user-badge{background:rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;font-size:12px;color:#ecf0f1;}
.prog-wrap{background:rgba(255,255,255,.2);border-radius:20px;height:22px;position:relative;overflow:hidden;max-width:700px;margin:0 auto;}
.prog-fill{height:100%;background:linear-gradient(90deg,#27ae60,#2ecc71);border-radius:20px;transition:width .4s;width:0%;}
.prog-lbl{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#fff;}

/* 통계 */
.stats-area{padding:12px 16px;background:#fff;border-bottom:1px solid #e0e0e0;}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.stat-card{background:#f8f9fa;border-radius:10px;padding:9px 14px;text-align:center;min-width:80px;border-top:3px solid #3498db;flex:1;}
.stat-card.red{border-top-color:#e74c3c; background:#fdf2f2;}
.stat-label{font-size:11px;color:#888;margin-bottom:3px;}
.stat-num{font-size:18px;font-weight:bold;color:#2c3e50;}
.stat-sub{font-size:11px;color:#27ae60;margin-top:2px;font-weight:bold;}
.stat-sub.danger{color:#c0392b;}

/* 툴바 */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;background:#fff;border-bottom:1px solid #eee;align-items:center;}
.tb-group{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.tb-div{width:1px;height:26px;background:#ddd;margin:0 3px;}
.fl{font-size:12px;color:#888;white-space:nowrap;}
.ftab{padding:6px 13px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;}
.ftab.on{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.act-btn{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:bold;cursor:pointer;color:#fff;}
.btn-add{background:#27ae60;} .btn-csv{background:#2980b9;} .btn-clear{background:#e74c3c;} .btn-export{background:#8e44ad;}
.admin-only{display:none;}

/* 테이블 */
#table-area{padding:0 14px 50px;}
.date-hd{background:#34495e;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:6px 6px 0 0;margin-top:14px;flex-wrap:wrap;gap:6px;}
.badge{background:#e74c3c;color:#fff;padding:3px 8px;border-radius:10px;font-size:12px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px;}
th,td{border:1px solid #e0e0e0;padding:8px 6px;text-align:center;vertical-align:middle;}
th{background:#f5f6fa;font-size:12px;font-weight:bold;color:#555;white-space:nowrap;}
td.text-left{text-align:left;}
tr:hover{background:#f5f8ff;}
tr.done-row{background:#f0faf4!important;}
.danger-row{background:#fdedec!important;}

/* 체크/입력 */
.chk-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.chk-wrap input{width:18px;height:18px;accent-color:#27ae60;}
.chk-lbl{font-size:10px;font-weight:bold;color:#bbb;}
.chk-lbl.done{color:#27ae60;}
.sel-small{padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;width:100%;}
.num-small{padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:40px;text-align:center;}
.num-danger{background:#fadbd8;color:#c0392b;font-weight:bold;border-color:#e74c3c;}
.ws-select{width:100%;padding:4px;border-radius:6px;border:1px solid #ddd;font-size:11px;text-align:center;}
.note-ta{width:100%;border:1px solid #eee;border-radius:4px;padding:4px;font-size:11px;resize:vertical;min-height:36px;outline:none;}
.del-btn{background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8000;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:480px;}
.form-row{margin-bottom:12px;text-align:left;}
.form-row label{display:block;font-size:12px;font-weight:bold;margin-bottom:4px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-weight:bold;}

#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;z-index:9800;}
.save-fab{position:fixed;bottom:24px;right:20px;background:#3498db;color:#fff;border:none;border-radius:50px;padding:13px 20px;font-size:13px;font-weight:bold;cursor:pointer;z-index:999;}
</style>
</head>
<body>

<div id="page-login">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">부서 통합 심방 대시보드</div>
    <div class="login-sub" id="login-sub">비밀번호를 입력하세요</div>

    <div id="pin-section">
      <div class="pin-display" id="pin-display">○ ○ ○ ○ ○ ○ ○ ○</div>
      <div class="pin-grid">
        <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
        <button class="pin-key pin-del" onclick="pinDel()">⌫</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key pin-enter" onclick="doLogin()">확인</button>
      </div>
      <div class="login-err" id="login-err"></div>
    </div>

    <div class="role-select-wrap" id="role-section">
      <label>직책을 선택하세요</label>
      <select class="role-select" id="role-select">
        <option value="">-- 직책 선택 --</option>
        <option value="지파총무">지파총무 (전체관리)</option>
        <option value="내무부장">내무부장 (전체관리)</option>
        <option value="자문회장">자문회장</option><option value="장년회장">장년회장</option>
        <option value="부녀회장">부녀회장</option><option value="청년회장">청년회장</option>
        <option value="자문회심방과장">자문회 심방과장</option><option value="장년회심방과장">장년회 심방과장</option>
        <option value="부녀회심방과장">부녀회 심방과장</option><option value="청년회심방과장">청년회 심방과장</option>
        <option value="일반">일반 사명자 (조회만)</option>
      </select>
      <button class="role-confirm-btn" onclick="confirmRole()">입장하기</button>
      <div class="login-err" id="role-err"></div>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div class="load-txt">처리 중...</div></div>

<div id="page-main">
  <div class="top-hd">
    <div class="top-hd-inner">
      <h1>📅 통합 심방 대시보드</h1>
      <div class="user-badge" id="user-badge"></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div><div class="prog-lbl" id="prog-lbl"></div></div>
  </div>

  <div class="stats-area">
    <div class="stats-row" id="dept-stats"></div>
  </div>

  <div class="toolbar">
    <div class="tb-group">
      <button class="ftab on" id="f-all" onclick="setFilter('status','all',this)">전체보기</button>
      <button class="ftab" id="f-pending" onclick="setFilter('status','pending',this)">미완료</button>
    </div>
    <div class="tb-div"></div>
    <div class="tb-group" id="dept-filters">
      <button class="ftab on" id="fd-all" onclick="setFilter('dept','all',this)">전체부서</button>
      <button class="ftab" id="fd-자문회" onclick="setFilter('dept','자문회',this)">자문회</button>
      <button class="ftab" id="fd-장년회" onclick="setFilter('dept','장년회',this)">장년회</button>
      <button class="ftab" id="fd-부녀회" onclick="setFilter('dept','부녀회',this)">부녀회</button>
      <button class="ftab" id="fd-청년회" onclick="setFilter('dept','청년회',this)">청년회</button>
    </div>
    <div class="tb-div"></div>
    <div class="tb-group admin-only" id="admin-btns">
      <button class="act-btn btn-add" onclick="openAddModal()">➕ 추가</button>
      <button class="act-btn btn-csv" onclick="openCsvModal()">📂 업로드</button>
      <button class="act-btn btn-export" onclick="downloadCSV()">📥 내보내기</button>
      <button class="act-btn btn-clear" onclick="confirmClearAll()">🗑 초기화</button>
    </div>
  </div>

  <div id="table-area"></div>
</div>

<button class="save-fab" onclick="saveAll()">💾 수동 저장</button>
<div id="toast"></div>

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3>➕ 결석자 추가</h3>
    <div class="form-row"><label>날짜</label><input type="text" id="add-date"></div>
    <div class="form-row"><label>부서</label><select id="add-dept"><option value="청년회">청년회</option><option value="장년회">장년회</option><option value="부녀회">부녀회</option><option value="자문회">자문회</option></select></div>
    <div class="form-row"><label>이름</label><input type="text" id="add-name"></div>
    <div class="form-row"><label>소속</label><input type="text" id="add-group"></div>
    <div class="form-row" style="display:flex;gap:10px;">
      <div style="flex:1"><label>구분</label><select id="add-category"><option value="일반">일반</option><option value="가족">가족</option><option value="가족외">가족외</option></select></div>
      <div style="flex:1"><label>연속결석</label><input type="number" id="add-absent" value="0" min="0"></div>
    </div>
    <div class="form-row"><label>심방자</label><input type="text" id="add-pastor"></div>
    <div class="form-row"><label>심방 계획</label><textarea id="add-plan"></textarea></div>
    <div class="modal-btns"><button style="background:#ddd" onclick="closeModal('add-modal')">취소</button><button style="background:#27ae60;color:#fff" onclick="submitAdd()">추가</button></div>
  </div>
</div>

<div class="modal-bg" id="csv-modal">
  <div class="modal">
    <h3>📂 CSV 업로드</h3>
    <p style="font-size:12px;color:#e74c3c;margin-bottom:10px;">⚠️ 주의: <b>내 부서의 기존 데이터가 삭제</b>되고 덮어씌워집니다.<br>(컬럼순서: 날짜,부서,이름,소속,구분,연속결석,심방자,계획)</p>
    <input type="file" id="csv-file" accept=".csv" onchange="handleCsvFile(this)" style="margin-bottom:10px;">
    <div class="modal-btns"><button style="background:#ddd" onclick="closeModal('csv-modal')">취소</button><button style="background:#3498db;color:#fff" onclick="submitCsv()" id="csv-upload-btn" disabled>업로드</button></div>
  </div>
</div>

<script>
// == 설정 ==
const SURL = 'https://gpbrkuxulyrcbllrchkn.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYnJrdXh1bHlyY2JsbHJjaGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjUwNjUsImV4cCI6MjA5MTk0MTA2NX0.KVCahNVpPcJk7NvpBVUnSNyYTUnHavLVt_WMBIMkNfU';
const META = 'shimfang_meta', TABLE = 'shimfang_progress', PW = '12341234';

let allRows = [], csvParsed = [];
let userRole = '', userDept = 'ALL', canEdit = false;
let fStatus = 'all', fDept = 'all';

async function sb(path, method='GET', body=null) {
  const opt = { method, headers: { 'apikey':SKEY, 'Authorization':'Bearer '+SKEY, 'Content-Type':'application/json', 'Prefer':method==='POST'?'resolution=merge-duplicates,return=minimal':'' }};
  if(body) opt.body = JSON.stringify(body);
  const res = await fetch(SURL+'/rest/v1/'+path, opt);
  if(!res.ok) throw new Error(await res.text());
  if(res.status===204) return [];
  const txt = await res.text(); return txt ? JSON.parse(txt) : [];
}

// == 로그인 & 권한 (수정된 키보드 로직) ==
let pinVal = '';

window.addEventListener('keydown', e => {
  const pageLogin = document.getElementById('page-login');
  
  // 로그인 화면 전체가 표시 중일 때만 작동
  if (pageLogin.style.display !== 'none') {
    const pinSec = document.getElementById('pin-section');
    const roleSec = document.getElementById('role-section');
    
    // 1. PIN 입력 단계
    if (pinSec && pinSec.style.display !== 'none') {
      if (e.key >= '0' && e.key <= '9') pinKey(e.key);
      else if (e.key === 'Backspace') pinDel();
      else if (e.key === 'Enter') doLogin();
    } 
    // 2. 직책 선택 단계
    else if (roleSec && roleSec.style.display !== 'none') {
      if (e.key === 'Enter') confirmRole();
    }
  }
});

function pinKey(k){ 
  if(pinVal.length < 8) { 
    pinVal += k; 
    renderPin(); 
    if(pinVal.length === 8) setTimeout(doLogin, 150); 
  } 
}
function pinDel(){ pinVal=pinVal.slice(0,-1); renderPin(); }
function renderPin(){ document.getElementById('pin-display').textContent = Array.from({length:8}).map((_,i)=>i<pinVal.length?'●':'○').join(' '); }

function doLogin() {
  if(pinVal === PW) {
    document.getElementById('pin-section').style.display = 'none';
    document.getElementById('login-sub').textContent = '권한(직책)을 선택해주세요';
    document.getElementById('role-section').style.display = 'block';
    
    // 키보드 사용자 편의를 위해 직책 선택창으로 바로 포커스 이동
    setTimeout(() => {
      document.getElementById('role-select').focus();
    }, 100);
    
  } else {
    document.getElementById('pw-error').style.display='block'; pinVal=''; renderPin();
    setTimeout(()=>document.getElementById('pw-error').style.display='none', 2000);
  }
}

function confirmRole() {
  userRole = document.getElementById('role-select').value;
  if(!userRole) return;
  
  if(['지파총무','내무부장'].includes(userRole)) { userDept = 'ALL'; canEdit = true; }
  else if(userRole.includes('자문회')) { userDept = '자문회'; canEdit = true; }
  else if(userRole.includes('장년회')) { userDept = '장년회'; canEdit = true; }
  else if(userRole.includes('부녀회')) { userDept = '부녀회'; canEdit = true; }
  else if(userRole.includes('청년회')) { userDept = '청년회'; canEdit = true; }
  else { userDept = 'ALL'; canEdit = false; } // 일반

  fDept = userDept;
  
  // UI 세팅
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-main').style.display = 'block';
  document.getElementById('user-badge').textContent = userRole;
  if(canEdit) document.getElementById('admin-btns').style.display = 'flex';
  
  // 부서 탭 숨기기
  if(userDept !== 'ALL') {
    document.getElementById('fd-all').style.display = 'none';
    ['자문회','장년회','부녀회','청년회'].forEach(d => { if(d !== userDept) document.getElementById('fd-'+d).style.display='none'; });
    setFilter('dept', userDept, document.getElementById('fd-'+userDept));
  }
  
  loadData();
}

// == 장기결석 위험 확인 ==
function isDanger(r) {
  const cnt = parseInt(r.absent_count)||0;
  if(['가족','가족외'].includes(r.category) && cnt >= 8) return true;
  if(r.category === '일반' && cnt >= 4) return true;
  return false;
}

// == 데이터 로드 ==
async function loadData() {
  showLoad(true);
  try {
    const [meta, prog] = await Promise.all([sb(META+'?select=*&order=sort_order.asc'), sb(TABLE+'?select=*')]);
    const pm = {}; prog.forEach(p => pm[p.row_id] = p);
    allRows = meta.map(m => ({
      id: m.row_id, date: m.date, dept: m.dept, name: m.name, group: m.group_name,
      category: m.category||'일반', absent_count: m.absent_count||0,
      pastor: m.pastor, plan: m.plan,
      is_done: pm[m.row_id]?.is_done||false, worship: pm[m.row_id]?.worship||'', note: pm[m.row_id]?.note||''
    }));
    renderTable(); renderStats();
  } catch(e) { toast('오류: '+e.message, true); }
  finally { showLoad(false); }
}

function setFilter(type, val, btn) {
  document.querySelectorAll(`[id^="f${type==='status'?'':('d-')}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(type==='status') fStatus = val; else fDept = val;
  renderTable();
}

// == 렌더링 ==
function renderTable() {
  const area = document.getElementById('table-area');
  const rows = allRows.filter(r => {
    if(fStatus==='done' && !r.is_done) return false;
    if(fStatus==='pending' && r.is_done) return false;
    if(fDept!=='all' && r.dept!==fDept) return false;
    return true;
  });

  if(!rows.length) { area.innerHTML='<div style="padding:40px;text-align:center;color:#888;">데이터가 없습니다</div>'; return; }

  const byDate = {}; rows.forEach(r => { (byDate[r.date]=byDate[r.date]||[]).push(r); });
  
  let html = '';
  for(const [date, arr] of Object.entries(byDate)) {
    html += `<div class="date-hd"><span>${date}</span><span class="badge">총 ${arr.length}명</span></div><div class="table-wrap"><table>
      <thead><tr>
        <th width="5%">부서</th><th width="6%">이름</th><th width="8%">소속</th><th width="6%">구분</th><th width="5%">결석</th>
        <th width="9%">심방자</th><th width="26%">계획</th><th width="6%">진행</th><th width="8%">예배</th><th width="16%">비고</th>
        ${canEdit?'<th width="5%">-</th>':''}
      </tr></thead><tbody>`;
    arr.forEach(r => {
      const danger = isDanger(r);
      const isMyDept = canEdit && (userDept === 'ALL' || userDept === r.dept);
      html += `<tr class="${r.is_done?'done-row':''} ${danger?'danger-row':''}">
        <td class="dept-${r.dept}">${r.dept}</td><td><b>${r.name}</b></td><td>${r.group}</td>
        <td>
          <select class="sel-small" onchange="updMeta('${r.id}','category',this.value)" ${!isMyDept?'disabled':''}>
            <option value="일반" ${r.category==='일반'?'selected':''}>일반</option><option value="가족" ${r.category==='가족'?'selected':''}>가족</option><option value="가족외" ${r.category==='가족외'?'selected':''}>가족외</option>
          </select>
        </td>
        <td><input type="number" class="num-small ${danger?'num-danger':''}" value="${r.absent_count}" min="0" onchange="updMeta('${r.id}','absent_count',this.value)" ${!isMyDept?'disabled':''}></td>
        <td>${r.pastor}</td><td class="text-left" style="font-size:11px;">${r.plan}</td>
        <td><div class="chk-wrap"><input type="checkbox" ${r.is_done?'checked':''} onchange="updProg('${r.id}','is_done',this.checked)" ${!isMyDept?'disabled':''}><span class="chk-lbl ${r.is_done?'done':''}">${r.is_done?'완료':'미완료'}</span></div></td>
        <td><select class="ws-select" onchange="updProg('${r.id}','worship',this.value)" ${!isMyDept?'disabled':''}><option value="">미정</option><option value="확정" ${r.worship==='확정'?'selected':''}>확정</option><option value="불참" ${r.worship==='불참'?'selected':''}>불참</option></select></td>
        <td><textarea class="note-ta" oninput="updProg('${r.id}','note',this.value)" ${!isMyDept?'disabled':''}>${r.note}</textarea></td>
        ${canEdit ? `<td>${isMyDept?`<button class="del-btn" onclick="delRow('${r.id}')">🗑</button>`:''}</td>` : ''}
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  area.innerHTML = html;
}

function renderStats() {
  const targetRows = userDept === 'ALL' ? allRows : allRows.filter(r => r.dept === userDept);
  const total = targetRows.length, done = targetRows.filter(r=>r.is_done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-lbl').textContent = `완료: ${done} / ${total} (${pct}%)`;

  let dangerCnt = targetRows.filter(r => isDanger(r)).length;
  let sHtml = `<div class="stat-card red"><div class="stat-label">🚨장기결석(주의)</div><div class="stat-num" style="color:#c0392b">${dangerCnt}명</div></div>`;
  
  const depts = userDept === 'ALL' ? ['자문회','장년회','부녀회','청년회'] : [userDept];
  depts.forEach(d => {
    const dr = targetRows.filter(r=>r.dept===d);
    sHtml += `<div class="stat-card"><div class="stat-label">${d}</div><div class="stat-num">${dr.length}</div><div class="stat-sub">완료 ${dr.filter(r=>r.is_done).length}</div></div>`;
  });
  document.getElementById('dept-stats').innerHTML = sHtml;
}

// == 즉시 업데이트 ==
let timer={};
function updProg(id, key, val) {
  const r = allRows.find(x=>x.id===id); if(!r) return; r[key] = val; renderStats();
  clearTimeout(timer['p_'+id]); timer['p_'+id] = setTimeout(async ()=>{
    try { await sb(TABLE, 'POST', [{ row_id:id, is_done:r.is_done, worship:r.worship, note:r.note, updated_at:new Date().toISOString() }]); toast('저장됨'); } catch(e){}
  }, 600);
}
function updMeta(id, key, val) {
  const r = allRows.find(x=>x.id===id); if(!r) return; r[key] = val; renderTable(); renderStats();
  clearTimeout(timer['m_'+id]); timer['m_'+id] = setTimeout(async ()=>{
    try { await sb(META, 'POST', [{ row_id:id, [key]:val, date:r.date, dept:r.dept, name:r.name }]); toast('반영됨'); } catch(e){ toast('컬럼 추가필요',true); }
  }, 600);
}

// == 관리자기능 ==
function openAddModal() { if(userDept!=='ALL') document.getElementById('add-dept').value = userDept; document.getElementById('add-modal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function submitAdd() {
  const dt = document.getElementById('add-date').value, nm = document.getElementById('add-name').value;
  if(!dt||!nm) return toast('날짜,이름 필수',true);
  const m = { row_id:'r_'+Date.now(), date:dt, dept:document.getElementById('add-dept').value, name:nm, group_name:document.getElementById('add-group').value, category:document.getElementById('add-category').value, absent_count:parseInt(document.getElementById('add-absent').value)||0, pastor:document.getElementById('add-pastor').value, plan:document.getElementById('add-plan').value, sort_order:allRows.length };
  showLoad(true);
  try { await sb(META,'POST',[m]); closeModal('add-modal'); loadData(); toast('추가됨'); } catch(e){toast('실패(DB확인)',true);} finally {showLoad(false);}
}

async function delRow(id) {
  if(!confirm('삭제할까요?')) return; showLoad(true);
  try { await sb(`${META}?row_id=eq.${id}`,'DELETE'); await sb(`${TABLE}?row_id=eq.${id}`,'DELETE'); loadData(); toast('삭제됨'); } catch(e){} finally {showLoad(false);}
}

async function confirmClearAll() {
  const msg = userDept === 'ALL' ? '전체 데이터를 삭제합니다' : `[${userDept}] 데이터만 삭제합니다`;
  if(!confirm(msg + ' 계속할까요?')) return;
  showLoad(true);
  try {
    if(userDept==='ALL') await sb(`${META}?sort_order=gte.0`,'DELETE');
    else await sb(`${META}?dept=eq.${userDept}`,'DELETE');
    loadData(); toast('초기화 완료');
  } catch(e){} finally {showLoad(false);}
}

// CSV 파일처리 (업로드)
function openCsvModal() { document.getElementById('csv-file').value=''; document.getElementById('csv-upload-btn').disabled=true; document.getElementById('csv-modal').classList.add('show'); }
function handleCsvFile(el) {
  const f = el.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    const lines = e.target.result.trim().split(/\r?\n/); csvParsed = [];
    for(let i=1; i<lines.length; i++) {
      const c = lines[i].match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)?.map(x=>x.trim().replace(/^"|"$/g,'')) || [];
      if(c.length<3||!c[2]) continue;
      let dpt = c[1]||'청년회';
      if(userDept!=='ALL' && dpt!==userDept) continue; // 내 부서것만 파싱
      csvParsed.push({ row_id:'r_'+Date.now()+'_'+i, date:c[0], dept:dpt, name:c[2], group_name:c[3], category:c[4]||'일반', absent_count:parseInt(c[5])||0, pastor:c[6], plan:c[7], sort_order:i });
    }
    document.getElementById('csv-upload-btn').disabled = false;
  };
  r.readAsText(f, 'UTF-8');
}
async function submitCsv() {
  showLoad(true);
  try {
    if(userDept==='ALL') await sb(`${META}?sort_order=gte.0`,'DELETE');
    else await sb(`${META}?dept=eq.${userDept}`,'DELETE');
    for(let i=0; i<csvParsed.length; i+=50) await sb(META,'POST',csvParsed.slice(i,i+50));
    closeModal('csv-modal'); loadData(); toast('업로드 완료');
  } catch(e){} finally {showLoad(false);}
}

// CSV 내보내기
function downloadCSV() {
  const rows = userDept === 'ALL' ? allRows : allRows.filter(r => r.dept === userDept);
  const hdr = ['날짜','부서','이름','소속','구분','연속결석','심방자','심방계획','진행여부','예배상태','비고'];
  let csv = '\uFEFF' + hdr.join(',') + '\n';
  rows.forEach(r => {
    const line = [ r.date, r.dept, r.name, r.group, r.category, r.absent_count, r.pastor, `"${(r.plan||'').replace(/"/g,'""')}"`, r.is_done?'완료':'미완료', r.worship||'미정', `"${(r.note||'').replace(/"/g,'""')}"` ];
    csv += line.join(',') + '\n';
  });
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `심방대시보드_${userDept}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function saveAll() { showLoad(true); setTimeout(()=>{showLoad(false); toast('수동저장 완료');},500); }
function showLoad(v) { document.getElementById('loading').style.display=v?'flex':'none'; }
let tt; function toast(m,e=false){ const t=document.getElementById('toast'); t.textContent=m; t.style.background=e?'#e74c3c':'#2c3e50'; t.style.display='block'; clearTimeout(tt); tt=setTimeout(()=>t.style.display='none',2000); }
</script>
